<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let carImage = new Image();
        carImage.src = 'path/to/car.png';
        let car = {
            x: canvas.width / 2 - 50,
            y: canvas.height / 2 - 50,
            width: 100,
            height: 100,
            speed: 5,
            direction: 0 // 0: UP, 1: RIGHT, 2: DOWN, 3: LEFT
        };

        function drawCar() {
            ctx.save();
            ctx.translate(car.x + car.width / 2, car.y + car.height / 2);
            ctx.rotate(car.direction * Math.PI / 2);
            ctx.drawImage(carImage, -car.width / 2, -car.height / 2, car.width, car.height);
            ctx.restore();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCar();

            // Inputs management
            document.onkeydown = function (e) {
                if (e.code === 'ArrowUp') car.direction = 0;
                else if (e.code === 'ArrowRight') car.direction = 1;
                else if (e.code === 'ArrowDown') car.direction = 2;
                else if (e.code === 'ArrowLeft') car.direction = 3;
            };

            switch (car.direction) {
                case 0: car.y -= car.speed; break;
                case 1: car.x += car.speed; break;
                case 2: car.y += car.speed; break;
                case 3: car.x -= car.speed; break;
            }
            requestAnimationFrame(update);
        }

        carImage.onload = function () {
            update();
        };
    </script>
</body>
</html>
