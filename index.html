<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D First-Person Car Game (Single File)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      font-size: 14px;
      text-shadow: 0 0 4px #000;
    }
    #carSelect {
      margin-top: 5px;
      max-width: 200px;
    }
    #hud {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-shadow: 0 0 4px #000;
      font-size: 16px;
      z-index: 10;
    }
    #mobileControls {
      position: fixed;
      bottom: 20px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }
    .btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .btn:active {
      background: rgba(0,200,255,0.4);
    }
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>3D Car Demo</strong></div>
    <div>Desktop: W/S = throttle, A/D = steer, mouse drag = look</div>
    <div>Mobile: use on-screen controls</div>
    <label>
      Car:
      <select id="carSelect"></select>
    </label>
  </div>
  <div id="hud">
    <span id="speedText">Speed: 0 km/h</span>
  </div>
  <div id="mobileControls">
    <div style="display:flex; gap:10px;">
      <div class="btn" id="btnLeft">◀</div>
      <div class="btn" id="btnRight">▶</div>
    </div>
    <div style="display:flex; gap:10px;">
      <div class="btn" id="btnBrake">⏹</div>
      <div class="btn" id="btnAccel">▲</div>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script>
    // -----------------------------
    // Car data (1000+ entries demo)
    // -----------------------------
    const carDataList = [];
    for (let i = 0; i < 1000; i++) {
      carDataList.push({
        id: "car_" + i,
        name: "Car " + (i + 1),
        maxSpeed: 120 + (i % 50),      // vary a bit
        acceleration: 20 + (i % 10),   // vary a bit
        turnSensitivity: 1.5 + (i % 5) * 0.1
      });
    }

    // -----------------------------
    // Basic Three.js setup
    // -----------------------------
    let scene, camera, renderer;
    let carBody, carVelocity = new THREE.Vector3(0, 0, 0);
    let carForward = new THREE.Vector3(0, 0, -1);
    let currentCarData = carDataList[0];

    let speedText = document.getElementById("speedText");
    const carSelect = document.getElementById("carSelect");

    // Controls state
    let accelInput = 0;
    let steerInput = 0;
    let yaw = 0;
    let pitch = 0;
    let isPointerDown = false;
    let lastPointerX = 0;
    let lastPointerY = 0;

    // Mobile control state
    let mobileAccel = 0;
    let mobileSteer = 0;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202030);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(10, 20, 10);
      scene.add(dirLight);

      // Ground
      const groundGeo = new THREE.PlaneGeometry(500, 500);
      const groundMat = new THREE.MeshPhongMaterial({ color: 0x303030 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Simple track lines
      const lineMat = new THREE.LineBasicMaterial({ color: 0x5555ff });
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-50, 0.01, -200),
        new THREE.Vector3(-50, 0.01, 200),
        new THREE.Vector3(50, 0.01, 200),
        new THREE.Vector3(50, 0.01, -200),
        new THREE.Vector3(-50, 0.01, -200),
      ]);
      const trackLine = new THREE.Line(lineGeo, lineMat);
      scene.add(trackLine);

      // Car body (simple box)
      const carGeo = new THREE.BoxGeometry(1.8, 1.0, 4.0);
      const carMat = new THREE.MeshPhongMaterial({ color: 0xff5533 });
      carBody = new THREE.Mesh(carGeo, carMat);
      carBody.position.set(0, 0.5, 0);
      scene.add(carBody);

      // Camera initial position (cockpit-ish)
      camera.position.set(0, 1.0, 0.5);
      camera.lookAt(carBody.position.clone().add(new THREE.Vector3(0, 1.0, -5)));

      // Populate car select
      carDataList.forEach((car, index) => {
        const opt = document.createElement("option");
        opt.value = car.id;
        opt.textContent = car.name;
        if (index === 0) opt.selected = true;
        carSelect.appendChild(opt);
      });

      carSelect.addEventListener("change", () => {
        const id = carSelect.value;
        const found = carDataList.find(c => c.id === id);
        if (found) {
          currentCarData = found;
          // Reset speed when switching
          carVelocity.set(0, 0, 0);
        }
      });

      // Keyboard controls
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);

      // Pointer (mouse/touch) for looking
      renderer.domElement.addEventListener("pointerdown", onPointerDown);
      renderer.domElement.addEventListener("pointermove", onPointerMove);
      renderer.domElement.addEventListener("pointerup", onPointerUp);
      renderer.domElement.addEventListener("pointerleave", onPointerUp);

      // Resize
      window.addEventListener("resize", onWindowResize);

      // Mobile buttons
      setupMobileButtons();
    }

    function setupMobileButtons() {
      const btnLeft = document.getElementById("btnLeft");
      const btnRight = document.getElementById("btnRight");
      const btnAccel = document.getElementById("btnAccel");
      const btnBrake = document.getElementById("btnBrake");

      function bindHold(btn, onChange) {
        let active = false;
        const start = (e) => {
          e.preventDefault();
          active = true;
          onChange(1);
        };
        const end = (e) => {
          e && e.preventDefault();
          active = false;
          onChange(0);
        };
        btn.addEventListener("pointerdown", start);
        btn.addEventListener("pointerup", end);
        btn.addEventListener("pointerleave", end);
        btn.addEventListener("pointercancel", end);
      }

      bindHold(btnLeft, v => { mobileSteer = v ? -1 : 0; });
      bindHold(btnRight, v => { mobileSteer = v ? 1 : 0; });
      bindHold(btnAccel, v => { mobileAccel = v ? 1 : 0; });
      bindHold(btnBrake, v => { mobileAccel = v ? -1 : 0; });
    }

    function onKeyDown(e) {
      if (e.code === "KeyW" || e.code === "ArrowUp") accelInput = 1;
      if (e.code === "KeyS" || e.code === "ArrowDown") accelInput = -1;
      if (e.code === "KeyA" || e.code === "ArrowLeft") steerInput = -1;
      if (e.code === "KeyD" || e.code === "ArrowRight") steerInput = 1;
    }

    function onKeyUp(e) {
      if (e.code === "KeyW" || e.code === "ArrowUp") if (accelInput === 1) accelInput = 0;
      if (e.code === "KeyS" || e.code === "ArrowDown") if (accelInput === -1) accelInput = 0;
      if (e.code === "KeyA" || e.code === "ArrowLeft") if (steerInput === -1) steerInput = 0;
      if (e.code === "KeyD" || e.code === "ArrowRight") if (steerInput === 1) steerInput = 0;
    }

    function onPointerDown(e) {
      isPointerDown = true;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
    }

    function onPointerMove(e) {
      if (!isPointerDown) return;
      const dx = e.clientX - lastPointerX;
      const dy = e.clientY - lastPointerY;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;

      const sensitivity = 0.0025;
      yaw -= dx * sensitivity;
      pitch -= dy * sensitivity;
      pitch = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, pitch));
    }

    function onPointerUp() {
      isPointerDown = false;
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // -----------------------------
    // Game loop
    // -----------------------------
    let lastTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      update(dt);
      renderer.render(scene, camera);
    }

    function update(dt) {
      // Combine desktop + mobile inputs
      const accel = clamp(accelInput + mobileAccel, -1, 1);
      const steer = clamp(steerInput + mobileSteer, -1, 1);

      // Car forward direction from yaw
      carForward.set(Math.sin(yaw), 0, -Math.cos(yaw));

      // Acceleration
      const accelForce = currentCarData.acceleration * accel;
      const accelVec = carForward.clone().multiplyScalar(accelForce * dt);
      carVelocity.add(accelVec);

      // Simple drag
      const drag = 0.98;
      carVelocity.multiplyScalar(drag);

      // Clamp speed
      const speed = carVelocity.length();
      const maxSpeed = currentCarData.maxSpeed / 3.6; // km/h -> m/s
      if (speed > maxSpeed) {
        carVelocity.setLength(maxSpeed);
      }

      // Steering (affects yaw based on speed)
      const steerAmount = currentCarData.turnSensitivity * steer * dt * (0.5 + speed);
      yaw += steerAmount;

      // Move car
      carBody.position.add(carVelocity.clone().multiplyScalar(dt));

      // Keep car on ground
      carBody.position.y = 0.5;

      // Update car rotation
      carBody.rotation.y = yaw;

      // Camera: first-person from cockpit
      const cockpitOffset = new THREE.Vector3(0, 0.6, 0.2);
      const cockpitWorldPos = carBody.position.clone().add(
        new THREE.Vector3(
          Math.sin(yaw) * cockpitOffset.z,
          cockpitOffset.y,
          -Math.cos(yaw) * cockpitOffset.z
        )
      );
      camera.position.copy(cockpitWorldPos);

      // Apply pitch/yaw to camera
      const lookDir = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch),
        Math.sin(pitch),
        -Math.cos(yaw) * Math.cos(pitch)
      );
      camera.lookAt(cockpitWorldPos.clone().add(lookDir));

      // HUD
      const speedKmh = (carVelocity.length() * 3.6).toFixed(0);
      speedText.textContent = "Speed: " + speedKmh + " km/h";
    }

    function clamp(v, min, max) {
      return v < min ? min : v > max ? max : v;
    }
  </script>
</body>
</html>
