<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const cars = [];
function createCar() {
    const geometry = new THREE.BoxGeometry(1, 0.5, 2);
    const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const car = new THREE.Mesh(geometry, material);
    car.position.x = Math.random() * 100 - 50;
    car.position.z = Math.random() * 100 - 50;
    cars.push(car);
    scene.add(car);
}

for (let i = 0; i < 1000; i++) {
    createCar();
}

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    cars.forEach(car => {
        car.rotation.y += 0.01;
    });
    renderer.render(scene, camera);
}
animate();

// Mobile controls
window.addEventListener('touchmove', function(event) {
    event.preventDefault();
    const touch = event.touches[0];
    camera.position.x = (touch.clientX / window.innerWidth) * 200 - 100;
    camera.position.z = (touch.clientY / window.innerHeight) * 200 - 100;
});

// Desktop controls
window.addEventListener('mousemove', function(event) {
    camera.position.x = (event.clientX / window.innerWidth) * 200 - 100;
    camera.position.z = (event.clientY / window.innerHeight) * 200 - 100;
});
</script>
</body>
</html>
